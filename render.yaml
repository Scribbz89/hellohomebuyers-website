services:
  - type: web
    name: hello-home-buyers
    runtime: static
    buildCommand: ""
    staticPublishPath: .

  - type: web
    name: hellohomebuyers-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        value: lsleadgeneration@gmail.com
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: ALLOWED_ORIGIN
        value: https://hellohomebuyers-website.onrender.com,https://www.hellohomebuyers.net,https://hellohomebuyers.net
